<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanctuary | Release Your Thoughts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <h1>Sanctuary</h1>
        <p class="subtitle">A safe, anonymous space to unpack your thoughts.</p>
        <div class="encouragement-banner">
            Whatever is weighing on you, you don't have to carry it alone. Speaking your truth is the first step toward lightness. <strong>Your voice matters here.</strong>
        </div>
    </header>

    <main class="app-container">
        
        <section class="post-box">
            <textarea id="vent-input" placeholder="What's weighing on your mind?"></textarea>
            <div class="action-row">
                <button id="submit-btn" onclick="createNewPost()">Release into the void</button>
            </div>
        </section>

        <section id="feed-container">
            </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your specific Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDYA5chxtaKErTglotZtwRtLzqjtJf7GJo",
            authDomain: "sanctuary-9859d.firebaseapp.com",
            projectId: "sanctuary-9859d",
            storageBucket: "sanctuary-9859d.firebasestorage.app",
            messagingSenderId: "1013187735582",
            appId: "1:1013187735582:web:d4eeff6a6a93fefc533e0f",
            measurementId: "G-ZSVW56N08G"
        };

        // Initialize Firebase & Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const postsRef = collection(db, "vents");

        // --- Identity Logic (Remembers you on this device) ---
        function getMyIdentity() {
            let myName = localStorage.getItem('sanctuary_user');
            if (!myName) {
                const animals = ['Panda', 'Fox', 'Koala', 'Hedgehog', 'Deer', 'Wolf', 'Otter', 'Lion', 'Falcon', 'Rabbit'];
                myName = `@Anonymous${animals[Math.floor(Math.random() * animals.length)]}`;
                localStorage.setItem('sanctuary_user', myName);
            }
            return myName;
        }

        // --- Create a New Post ---
        window.createNewPost = async () => {
            const textInput = document.getElementById('vent-input');
            const text = textInput.value.trim();
            if(!text) return;

            try {
                await addDoc(postsRef, {
                    username: getMyIdentity(),
                    text: text,
                    timestamp: Date.now(),
                    replies: []
                });
                textInput.value = '';
            } catch (e) {
                console.error("Error adding post: ", e);
                alert("Make sure your Firestore Rules are set to 'Test Mode'!");
            }
        };

        // --- Add a Reply ---
        window.addReply = async (postId) => {
            const input = document.getElementById(`input-${postId}`);
            const text = input.value.trim();
            if(!text) return;

            const postDoc = doc(db, "vents", postId);
            try {
                await updateDoc(postDoc, {
                    replies: arrayUnion({
                        username: getMyIdentity(),
                        text: text,
                        time: Date.now()
                    })
                });
                input.value = '';
            } catch (e) {
                console.error("Error adding reply: ", e);
            }
        };

        // --- Real-time Feed Listener ---
        const q = query(postsRef, orderBy("timestamp", "desc"), limit(50));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed-container');
            feed.innerHTML = '';
            snapshot.forEach((doc) => {
                renderPost(doc.id, doc.data());
            });
        });

        // --- Render UI for Posts ---
        function renderPost(id, data) {
            const feed = document.getElementById('feed-container');
            const date = new Date(data.timestamp);
            const timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + ' • ' + date.toLocaleDateString();
            
            const replies = data.replies || [];
            const hasManyReplies = replies.length > 5;

            const card = document.createElement('div');
            card.className = 'vent-card new-post-animation';
            card.innerHTML = `
                <span class="user-tag">${data.username}</span>
                <p class="vent-text">${data.text}</p>
                <div class="card-footer">Shared at ${timeString}</div>
                
                <div class="card-actions">
                    <button class="reply-btn" onclick="toggleReply('${id}')">
                        Conversation (${replies.length})
                    </button>
                </div>

                <div id="replies-${id}" class="replies-container" style="display:none;">
                    <div id="list-${id}">
                        ${replies.map((r, index) => `
                            <div class="reply-item" style="${hasManyReplies && index < replies.length - 5 ? 'display:none;' : ''}">
                                <div class="reply-header">
                                    <span class="reply-user">${r.username}</span>
                                    <span class="reply-time">${new Date(r.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                </div>
                                <div class="reply-body">${r.text}</div>
                            </div>
                        `).join('')}
                    </div>
                    
                    ${hasManyReplies ? `<button id="more-${id}" class="read-more-btn" onclick="expandReplies('${id}')">View older replies...</button>` : ''}

                    <div class="reply-input-area">
                        <input type="text" id="input-${id}" class="reply-field" placeholder="Reply anonymously...">
                        <button class="reply-submit" onclick="addReply('${id}')">Reply</button>
                    </div>
                </div>
            `;
            feed.appendChild(card);
        }

        window.toggleReply = (id) => {
            const el = document.getElementById(`replies-${id}`);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        };

        window.expandReplies = (id) => {
            const list = document.getElementById(`list-${id}`);
            const items = list.querySelectorAll('.reply-item');
            items.forEach(item => item.style.display = 'block');
            document.getElementById(`more-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
