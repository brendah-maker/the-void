<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sanctuary | Anonymous Vent Feed</title>
    <!-- This line links your HTML to your CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER & SAFETY BANNER -->
    <header class="app-header">
        <h1>Sanctuary</h1>
        <p class="subtitle">A safe, anonymous space to unpack your thoughts.</p>
        <div class="crisis-banner">
            Feeling overwhelmed? You are not alone. Text <strong>HOME</strong> to <strong>741741</strong> for free, 24/7 crisis support.
        </div>
    </header>

    <!-- MAIN APPLICATION AREA -->
    <main class="app-container">
        
        <!-- THE POSTING FORM -->
        <section class="post-box">
            <textarea id="vent-input" placeholder="What's weighing on your mind? (Keep it anonymous...)"></textarea>
            <div class="action-row">
                <button id="submit-btn" onclick="createNewPost()">Release into the void</button>
            </div>
        </section>

        <!-- THE FEED -->
        <section id="feed-container">
            <!-- Default placeholder post -->
            <div class="vent-card">
                <span class="user-tag">@AnonymousOwl</span>
                <p class="vent-text">Sometimes the quietest rooms are the loudest ones in my head. Just needed to type this out.</p>
                <div class="card-footer">Shared 2 minutes ago</div>
            </div>
        </section>

    </main>

    <!-- INTERACTION SCRIPT -->
    <script>
        function createNewPost() {
            const textInput = document.getElementById('vent-input');
            const text = textInput.value.trim();
            
            if(!text) return;

            // Generate a random anonymous username
            const animals = ['Panda', 'Fox', 'Koala', 'Hedgehog', 'Deer', 'Wolf', 'Otter'];
            const randomAnimal = animals[Math.floor(Math.random() * animals.length)];
            const username = `@Anonymous${randomAnimal}`;

            // Create the HTML structure for the new post
            const newPost = document.createElement('div');
            newPost.className = 'vent-card new-post-animation';
            newPost.innerHTML = `
                <span class="user-tag">${username}</span>
                <p class="vent-text">${text}</p>
                <div class="card-footer">Shared just now</div>
            `;

            // Push it to the top of the feed and clear the text box
            const feed = document.getElementById('feed-container');
            feed.insertBefore(newPost, feed.firstChild);
            textInput.value = '';
        }
    </script>
</body>
</html>
