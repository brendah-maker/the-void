<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanctuary | Release Your Thoughts</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="app-header">
        <h1>Sanctuary</h1>
        <p class="subtitle">A safe, anonymous space to unpack your thoughts.</p>
        <div class="encouragement-banner">
            Whatever is weighing on you, you don't have to carry it alone. <strong>Your voice matters here.</strong>
        </div>
    </header>

    <main class="app-container">
        <section class="post-box">
            <textarea id="vent-input" placeholder="What's weighing on your mind? (Keep it anonymous...)"></textarea>
            <div class="action-row">
                <button id="submit-btn" onclick="createNewPost()">Release into the void</button>
            </div>
        </section>

        <section id="feed-container"></section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYA5chxtaKErTglotZtwRtLzqjtJf7GJo",
            authDomain: "sanctuary-9859d.firebaseapp.com",
            projectId: "sanctuary-9859d",
            storageBucket: "sanctuary-9859d.firebasestorage.app",
            messagingSenderId: "1013187735582",
            appId: "1:1013187735582:web:d4eeff6a6a93fefc533e0f",
            measurementId: "G-ZSVW56N08G"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const postsRef = collection(db, "vents");

        function getMyIdentity() {
            const today = new Date().toDateString();
            let storedName = localStorage.getItem('sanctuary_user');
            let storedDate = localStorage.getItem('sanctuary_date');

            if (!storedName || storedDate !== today) {
                const animals = ['Panda', 'Fox', 'Koala', 'Hedgehog', 'Deer', 'Wolf', 'Otter', 'Lion', 'Falcon', 'Rabbit'];
                storedName = `@Anonymous${animals[Math.floor(Math.random() * animals.length)]}`;
                localStorage.setItem('sanctuary_user', storedName);
                localStorage.setItem('sanctuary_date', today);
            }
            return storedName;
        }

        function formatTime(timestamp) {
            const now = new Date();
            const date = new Date(timestamp);
            const diffInHours = (now - date) / (1000 * 60 * 60);
            
            if (diffInHours < 24 && now.getDate() === date.getDate()) {
                return `${date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
            } else if (diffInHours < 48 && now.getDate() !== date.getDate()) {
                return "Yesterday";
            } else {
                const days = Math.floor(diffInHours / 24);
                return `${days} days ago`;
            }
        }

        window.createNewPost = async () => {
            const textInput = document.getElementById('vent-input');
            const text = textInput.value.trim();
            if(!text) return;
            await addDoc(postsRef, {
                username: getMyIdentity(),
                text: text,
                timestamp: Date.now(),
                hugs: 0,
                hearts: 0,
                sparkles: 0,
                replies: []
            });
            textInput.value = '';
        };

        window.react = async (postId, type) => {
            const postDoc = doc(db, "vents", postId);
            const updateData = {};
            updateData[type] = increment(1);
            await updateDoc(postDoc, updateData);
        };

        window.addReply = async (postId) => {
            const input = document.getElementById(`input-${postId}`);
            const text = input.value.trim();
            if(!text) return;

            const postDoc = doc(db, "vents", postId);
            await updateDoc(postDoc, {
                replies: arrayUnion({
                    username: getMyIdentity(),
                    text: text,
                    time: Date.now()
                })
            });
            input.value = '';
        };

        const q = query(postsRef, orderBy("timestamp", "desc"), limit(50));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed-container');
            feed.innerHTML = '';
            snapshot.forEach((doc) => renderPost(doc.id, doc.data()));
        });

        function renderPost(id, data) {
            const feed = document.getElementById('feed-container');
            const replies = data.replies || [];
            const showLimit = 5;
            const hasMore = replies.length > showLimit;

            const card = document.createElement('div');
            card.className = 'vent-card new-post-animation';
            card.innerHTML = `
                <span class="user-tag">${data.username}</span>
                <p class="vent-text">${data.text}</p>
                
                <div class="interaction-bar">
                    <div class="reaction-row">
                        <button class="react-btn" onclick="react('${id}', 'hugs')">🫂 <span>${data.hugs || 0}</span></button>
                        <button class="react-btn" onclick="react('${id}', 'hearts')">🤍 <span>${data.hearts || 0}</span></button>
                        <button class="react-btn" onclick="react('${id}', 'sparkles')">✨ <span>${data.sparkles || 0}</span></button>
                    </div>
                    <button class="conv-toggle" onclick="toggleReplies('${id}')">Conversation (${replies.length})</button>
                </div>

                <div id="replies-${id}" class="replies-section" style="display:none;">
                    <div class="reply-list" id="list-${id}">
                        ${replies.slice(0, showLimit).map(r => `
                            <div class="reply-item">
                                <span class="reply-user">${r.username}</span>
                                <p>${r.text}</p>
                            </div>
                        `).join('')}
                        ${hasMore ? `<div id="more-${id}" style="display:none;">
                            ${replies.slice(showLimit).map(r => `
                                <div class="reply-item">
                                    <span class="reply-user">${r.username}</span>
                                    <p>${r.text}</p>
                                </div>
                            `).join('')}
                        </div>
                        <button class="read-more-btn" id="btn-more-${id}" onclick="showAllReplies('${id}')">Read more...</button>` : ''}
                    </div>
                    <div class="reply-input-box">
                        <input type="text" id="input-${id}" placeholder="Write a kind word...">
                        <button onclick="addReply('${id}')">Send</button>
                    </div>
                </div>

                <div class="card-footer">
                    <span class="timestamp">Shared ${formatTime(data.timestamp)}</span>
                </div>
            `;
            feed.appendChild(card);
        }

        window.toggleReplies = (id) => {
            const el = document.getElementById(`replies-${id}`);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        };

        window.showAllReplies = (id) => {
            document.getElementById(`more-${id}`).style.display = 'block';
            document.getElementById(`btn-more-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
