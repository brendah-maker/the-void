<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanctuary | Release Your Thoughts</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="app-header">
        <h1>Sanctuary</h1>
        <p class="subtitle">A safe, anonymous space to unpack your thoughts.</p>
        <div class="encouragement-banner">
            Whatever is weighing on you, you don't have to carry it alone. <strong>Your voice matters here.</strong>
        </div>
    </header>

    <main class="app-container">
        <section class="post-box">
            <textarea id="vent-input" placeholder="What's weighing on your mind? (Keep it anonymous...)"></textarea>
            <div class="action-row">
                <button id="submit-btn" onclick="createNewPost()">Release into the void</button>
            </div>
        </section>

        <section id="feed-container">
            </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your verified Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDYA5chxtaKErTglotZtwRtLzqjtJf7GJo",
            authDomain: "sanctuary-9859d.firebaseapp.com",
            projectId: "sanctuary-9859d",
            storageBucket: "sanctuary-9859d.firebasestorage.app",
            messagingSenderId: "1013187735582",
            appId: "1:1013187735582:web:d4eeff6a6a93fefc533e0f",
            measurementId: "G-ZSVW56N08G"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const postsRef = collection(db, "vents");

        // Identity Persistence
        function getMyIdentity() {
            let myName = localStorage.getItem('sanctuary_user');
            if (!myName) {
                const animals = ['Panda', 'Fox', 'Koala', 'Hedgehog', 'Deer', 'Wolf', 'Otter', 'Lion', 'Falcon', 'Rabbit'];
                myName = `@Anonymous${animals[Math.floor(Math.random() * animals.length)]}`;
                localStorage.setItem('sanctuary_user', myName);
            }
            return myName;
        }

        window.createNewPost = async () => {
            const textInput = document.getElementById('vent-input');
            const text = textInput.value.trim();
            if(!text) return;
            await addDoc(postsRef, {
                username: getMyIdentity(),
                text: text,
                timestamp: Date.now(),
                replies: []
            });
            textInput.value = '';
        };

        window.addReply = async (postId, emojiText = null) => {
            const input = document.getElementById(`input-${postId}`);
            const text = emojiText || input.value.trim();
            if(!text) return;

            const postDoc = doc(db, "vents", postId);
            await updateDoc(postDoc, {
                replies: arrayUnion({
                    username: getMyIdentity(),
                    text: text,
                    time: Date.now()
                })
            });
            if(!emojiText) input.value = '';
        };

        // Listen for new posts
        const q = query(postsRef, orderBy("timestamp", "desc"), limit(50));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed-container');
            feed.innerHTML = '';
            snapshot.forEach((doc) => renderPost(doc.id, doc.data()));
        });

        function renderPost(id, data) {
            const feed = document.getElementById('feed-container');
            const timeString = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const replies = data.replies || [];

            const card = document.createElement('div');
            card.className = 'vent-card new-post-animation';
            card.innerHTML = `
                <span class="user-tag">${data.username}</span>
                <p class="vent-text">${data.text}</p>
                <div class="card-footer">Shared at ${timeString}</div>
                
                <div class="card-actions">
                    <button class="reply-btn" onclick="toggleReply('${id}')">Conversation (${replies.length})</button>
                </div>

                <div id="replies-${id}" class="replies-container" style="display:none;">
                    <div class="emoji-bar">
                        <span onclick="addReply('${id}', '🤍')">🤍</span>
                        <span onclick="addReply('${id}', '🫂')">🫂</span>
                        <span onclick="addReply('${id}', '✨')">✨</span>
                        <span onclick="addReply('${id}', '🌊')">🌊</span>
                        <span onclick="addReply('${id}', '🌱')">🌱</span>
                    </div>
                    <div id="list-${id}">
                        ${replies.map(r => `
                            <div class="reply-item">
                                <span class="reply-user">${r.username}</span>
                                <div class="reply-body">${r.text}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="reply-input-area">
                        <input type="text" id="input-${id}" class="reply-field" placeholder="Reply anonymously...">
                        <button class="reply-submit" onclick="addReply('${id}')">Send</button>
                    </div>
                </div>
            `;
            feed.appendChild(card);
        }

        window.toggleReply = (id) => {
            const el = document.getElementById(`replies-${id}`);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        };
    </script>
</body>
</html>
