<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanctuary | Release Your Thoughts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <h1>Sanctuary</h1>
        <p class="subtitle">A safe, anonymous space to unpack your thoughts.</p>
        <div class="encouragement-banner">
            Whatever is weighing on you, you don't have to carry it alone. Speaking your truth is the first step toward lightness. <strong>Your voice matters here.</strong>
        </div>
    </header>

    <main class="app-container">
        
        <section class="post-box">
            <textarea id="vent-input" placeholder="What's weighing on your mind?"></textarea>
            <div class="action-row">
                <button id="submit-btn" onclick="createNewPost()">Release into the void</button>
            </div>
        </section>

        <section id="feed-container">
            </section>

    </main>

    <script>
        // 1. IDENTITY LOGIC: Check if user already has a name stored in their browser
        function getMyIdentity() {
            let myName = localStorage.getItem('sanctuary_user');
            if (!myName) {
                const animals = ['Panda', 'Fox', 'Koala', 'Hedgehog', 'Deer', 'Wolf', 'Otter', 'Lion', 'Falcon', 'Rabbit'];
                myName = `@Anonymous${animals[Math.floor(Math.random() * animals.length)]}`;
                localStorage.setItem('sanctuary_user', myName);
            }
            return myName;
        }

        // 2. TIME LOGIC: Formats the current date and time
        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + ' • ' + now.toLocaleDateString();
        }

        function createNewPost() {
            const textInput = document.getElementById('vent-input');
            const text = textInput.value.trim();
            if(!text) return;

            const postId = Date.now();
            const username = getMyIdentity(); // Uses the same name every time
            const timestamp = getCurrentTime();

            const newPost = document.createElement('div');
            newPost.className = 'vent-card new-post-animation';
            newPost.innerHTML = `
                <span class="user-tag">${username}</span>
                <p class="vent-text">${text}</p>
                <div class="card-footer">Shared at ${timestamp}</div>
                
                <div class="card-actions">
                    <button class="reply-btn" onclick="toggleReply('${postId}')">Join Conversation</button>
                </div>

                <div id="replies-${postId}" class="replies-container" style="display:none;">
                    <div id="list-${postId}"></div>
                    <button id="more-${postId}" class="read-more-btn" style="display:none;" onclick="expandReplies('${postId}')">View more replies...</button>
                    <div class="reply-input-area">
                        <input type="text" id="input-${postId}" class="reply-field" placeholder="Reply anonymously...">
                        <button class="reply-submit" onclick="addReply('${postId}')">Reply</button>
                    </div>
                </div>
            `;

            const feed = document.getElementById('feed-container');
            feed.insertBefore(newPost, feed.firstChild);
            textInput.value = '';
        }

        function toggleReply(postId) {
            const container = document.getElementById(`replies-${postId}`);
            container.style.display = container.style.display === 'none' ? 'block' : 'none';
        }

        function addReply(postId) {
            const input = document.getElementById(`input-${postId}`);
            const list = document.getElementById(`list-${postId}`);
            const text = input.value.trim();
            if(!text) return;

            const replyName = getMyIdentity(); // Uses the same stored identity
            const replyTime = getCurrentTime();
            
            const replyDiv = document.createElement('div');
            replyDiv.className = 'reply-item';
            replyDiv.innerHTML = `
                <div class="reply-header">
                    <span class="reply-user">${replyName}</span>
                    <span class="reply-time">${replyTime}</span>
                </div>
                <div class="reply-body">${text}</div>
            `;
            
            list.appendChild(replyDiv);
            input.value = '';

            const replies = list.getElementsByClassName('reply-item');
            if (replies.length > 5) {
                for (let i = 0; i < replies.length - 5; i++) {
                    replies[i].style.display = 'none';
                }
                document.getElementById(`more-${postId}`).style.display = 'block';
            }
        }

        function expandReplies(postId) {
            const list = document.getElementById(`list-${postId}`);
            const replies = list.getElementsByClassName('reply-item');
            for (let i = 0; i < replies.length; i++) {
                replies[i].style.display = 'block';
            }
            document.getElementById(`more-${postId}`).style.display = 'none';
        }
    </script>
</body>
</html>
